<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="pull-left">
        <form class="form-inline" style="margin:15px 5px">
            <div class="form-group">
                <label>所属课程:</label>
                <div class="input-group">
                    <input type="text" class="form-control org" id="course-search">
                    <input type="text" id="course-search-id" name="course-search-id" hidden>
                    <div class="input-group-btn">
                        <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                            <span class="caret"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-right" role="menu">
                        </ul>
                    </div>
                </div>
            </div>
            <input type="button" class="btn btn-primary" value="查询" id="queryBtn"/>
        </form>
    </div>

    <div class="pull-right"  style="margin-top:15px;margin-right: 10px">
        <button class="btn btn-primary" data-toggle="modal" data-target="#add">添加</button>
        <button class="btn btn-danger" id="deleteAll">删除</button>
    </div>
    <div>
        <table id="tb_major"></table>
    </div>
</div>
<!--更新专业模态框-->
<div class="modal fade" id="update" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" data-dismiss="modal">&times;</span>
                <h3 class="modal-title">修改</h3>
            </div>

            <div class="modal-body" style="min-height: 400px;margin-top: 20px">
                <form action="#" class="form-horizontal" method="post" id="edit_homework" name="edit_homework">

                    <div class="form-group">
                        <input type="text" id="edit_homeId" name="edit_homeId" hidden>
                        <label class="col-sm-3 control-label right">所属班级：</label>
                        <div class="col-sm-7">
                            <div class="input-group">
                                <input type="text" class="form-control org" id="edit_class" name="edit_class">
                                <input type="text" id="edit_classId" name="edit_classId" hidden>
                                <div class="input-group-btn" style="z-index:99999!important;">
                                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                        <span class="caret"></span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">课程：</label>
                        <div class="col-sm-7">
                            <div class="input-group">
                                <input type="text" class="form-control org" name="edit_course" id="edit_course">
                                <input type="text" id="edit_courseId" name="edit_courseId" hidden>
                                <div class="input-group-btn" style="z-index:99999!important;">
                                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                        <span class="caret"></span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">所属章：</label>
                        <div class="col-sm-7">
                            <div class="input-group">
                                <input type="text" class="form-control org" id="edit_chapter" name="edit_chapter">
                                <input type="text" id="edit_chapterId" name="edit_chapterId" hidden>
                                <div class="input-group-btn" style="z-index:99999!important;">
                                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                        <span class="caret"></span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">所属节：</label>
                        <div class="col-sm-7">
                            <div class="input-group">
                                <input type="text" class="form-control org" id="edit_section" name="edit_section">
                                <input type="text" id="edit_sectionId" name="edit_sectionId" hidden>
                                <div class="input-group-btn" style="z-index:99999!important;">
                                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                        <span class="caret"></span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">作业标题：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" name="edit_title" id="edit_title" placeholder="请输入标题">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">附件上传：</label>
                        <div class="col-sm-7">
                            <input type="file" class="form-control" name="edit_file" id="edit_file">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">作业内容：</label>
                        <div class="col-sm-7">
                            <textarea class="form-control" type="text" name="edit_content" id="edit_content"></textarea>
                        </div>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" data-dismiss="modal">关闭</button>
                <button class="btn btn-primary" id="update_sure">确定</button>
            </div>
        </div>
    </div>
</div>
<!--添加专业模态框-->

    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">

                                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">

                                    <ul class="dropdown-menu dropdown-menu-right" role="menu">

                        <label class="col-sm-3 control-label right">课程：</label>

                            <div class="input-group">
                                <input type="text" class="form-control org" id="course-save">
                                <input type="text" id="course-save-id" name="courseId" hidden>
                                <div class="input-group-btn" style="z-index:99999!important;">
                                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                        <span class="caret"></span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">所属章：</label>

                                <input type="text" id="chapter-save-id" name="chapterId" hidden>

                                        <span class="caret"></span>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">作业标题：</label>
                        <div class="col-sm-7">
                            <input type="text" class="form-control" name="title" placeholder="请输入标题">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">附件上传：</label>
                        <div class="col-sm-7">
                            <input type="file" class="form-control" name="uploadFile">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label right">作业内容：</label>
                        <div class="col-sm-7">
                            <textarea class="form-control" type="text" name="desc"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" data-dismiss="modal">关闭</button>
                <button class="btn btn-primary" id="add_sure">确定</button>
            </div>
        </div>
    </div>
</div>
<!-- 全局js -->
<script src="../../static/js/jquery.min.js?v=2.1.4" th:src="@{/static/js/jquery.min.js(v='2.1.4')}"></script>
<script src="../../static/js/bootstrap.min.js?v=3.3.6" th:src="@{/static/js/bootstrap.min.js(v='3.3.6')}"></script>
<!-- 自定义js -->
<script src="../../static/js/content.js?v=1.0.0" th:src="@{/static/js/content.js(v='1.0.0')}"></script>
<!-- Bootstrap table -->
<script src="../../static/js/plugins/bootstrap-table/bootstrap-table.min.js"
        th:src="@{/static/js/plugins/bootstrap-table/bootstrap-table.min.js}"></script>
<script src="../../static/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js"
        th:src="@{/static/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js}"></script>
<script src="../../static/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"
        th:src="@{/static/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js}"></script>
<!--动态搜索-->
<script src="../../static/js/plugins/suggest/bootstrap-suggest.min.js"
        th:src="@{/static/js/plugins/suggest/bootstrap-suggest.min.js}"></script>
<!-- Sweet alert -->
<script src="../../static/js/plugins/sweetalert/sweetalert.min.js"
        th:src="@{/static/js/plugins/sweetalert/sweetalert.min.js}"></script>
<!-- Switchery -->
<script src="../../static/js/plugins/switchery/switchery.js"  th:src="@{/static/js/plugins/switchery/switchery.js}"></script>

<script>
    $(function () {
        //初始化表格
        var init = new initdata();
        init.Init('/owep/clazz/allHomework');
        //点击按钮开始搜索
        $("#queryBtn").click(function () {
            let courseId = $("#course-search-id").val();
            //判断条件是否存在
            if (courseId==""){
                alert("请选择查询条件");
                return ;
            }
            //执行查询
            init.Init('/owep/clazz/getHomeworkByCourseId?courseId=' + courseId);
        });
        //删除所有
        $('#deleteAll').click(function () {
            // 删除按钮事件
            if (!confirm("是否确认删除？"))
                return;
            var rows = $("#tb_major").bootstrapTable('getSelections');// 获得要删除的数据
            if (rows.length == 0) {// rows 主要是为了判断是否选中，下面的else内容才是主要
                alert("请先选择要删除的记录!");
                return;
            } else {
                var ids = new Array();// 声明一个数组 该数组将要存放所有选择的id
                $(rows).each(function() {// 通过获得别选中的来进行遍历
                    ids.push(this.id);// cid为获得到的整条数据中的一列
                });
                // 发送ajax请求
                console.log("ids: " + ids);
                var idList=JSON.stringify(ids);
                console.log("idList: " + idList);
                $.ajax({
                    url:"/owep/clazz/deleteSelectHomework",
                    method:"POST",
                    async:true,
                    data:idList,
                    dataType:"text",
                    contentType:"application/json",
                    processData:false,
                    success:function (data) {
                        $("#tb_major").bootstrapTable('refresh');
                    },
                    error:function(jqXHR){
                        alert("删除失败");
                    }
                });
            }
        });
        //动态搜索选择下拉框
        testdataBsSuggest1;
        //添加事件
        $('#add_sure').click(function (e) {
            e.preventDefault(); // 防止默认提交行为

            var formData = new FormData($('#uploadForm')[0]); // 假设您的表单ID是uploadForm

            // ... 确保formData包含了所有需要的参数，比如classId, courseId等

            $.ajax({
                url: '/owep/clazz/saveHomework', // 控制器映射的URL
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function (response) {
                    swal("添加成功", "", "success");
                    $("#tb_major").bootstrapTable('refresh')
                },
                error: function (response) {
                    alert("作业添加失败，请重试！");
                }
            });
        });
        //更新事件
        $('#update_sure').click(function (e) {
            e.preventDefault(); // 防止默认提交行为

            var formData = new FormData();
            formData.append('id', $('#edit_homeId').val());
            // 重复此过程，为每个需要的字段添加键值对
            formData.append('clazz.id', $('#edit_classId').val());
            formData.append('course.id', $('#edit_courseId').val());
            formData.append('chapter.id', $('#edit_chapterId').val());
            formData.append('section.id', $('#edit_sectionId').val());
            formData.append('workTitle', $('#edit_title').val());
            formData.append('workContent', $('#edit_content').val());
            formData.append('file', $('#edit_file')[0].files[0]);
            console.log("file: " + $('#edit_file').val());

            // 发送 AJAX 请求
            $.ajax({
                url: '/owep/clazz/updateHomework', // 控制器映射的URL
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function (response) {
                    window.location.reload();
                },
                error: function (response) {
                    alert("更新失败，请重试！");
                }
            });
        });
    });

    var testdataBsSuggest1 = $("#course-search").bsSuggest({
        url:"/owep/clazz/getAllCourse",
        idField:"id",
        keyField:"courseName",
        effectiveFields: ["courseName"],
    }).on('onSetSelectValue',function (e,keyword) {
        $("#course-search-id").val(keyword.id);
    });

    var testdataBsSuggest2 = $("#class-save").bsSuggest({
        url:"/owep/clazz/getAllClass",
        idField:"id",
        keyField:"className",
        effectiveFields: ["className"],
    }).on('onSetSelectValue',function (e,keyword) {
        $("#class-save-id").val(keyword.id);
        $("#course-save").bsSuggest("destroy");
        $("#course-save").bsSuggest({
            url:"/owep/clazz/getCourseByClassId?id=" + keyword.id,
            idField:"id",
            keyField:"courseName",
            effectiveFields: ["courseName"],
        }).on('onSetSelectValue',function (e,keyword) {
            $("#course-save-id").val(keyword.id);
            $("#chapter-save").bsSuggest("destroy");
            $("#chapter-save").bsSuggest({
                url:"/owep/clazz/getChapterByCourseId?id=" + keyword.id,
                idField:"id",
                keyField:"chapterName",
                effectiveFields: ["chapterName"],
            }).on('onSetSelectValue',function (e,keyword) {
                $("#chapter-save-id").val(keyword.id);
                $("#section-save").bsSuggest("destroy");
                $("#section-save").bsSuggest({
                    url:"/owep/clazz/getSectionByChapterId?id=" + keyword.id,
                    idField:"id",
                    keyField:"sectionName",
                    effectiveFields: ["sectionName"],
                }).on('onSetSelectValue',function (e,keyword) {
                    $("#section-save-id").val(keyword.id);
                })
            })
        })
    });

    var testdataBsSuggest3 = $("#edit_class").bsSuggest({
        url:"/owep/clazz/getAllClass",
        idField:"id",
        keyField:"className",
        effectiveFields: ["className"],
    }).on('onSetSelectValue',function (e,keyword) {
        $("#edit_classId").val(keyword.id);
        $("#edit_course").bsSuggest("destroy");
        $("#edit_course").bsSuggest({
            url:"/owep/clazz/getCourseByClassId?id=" + keyword.id,
            idField:"id",
            keyField:"courseName",
            effectiveFields: ["courseName"],
        }).on('onSetSelectValue',function (e,keyword) {
            $("#edit_courseId").val(keyword.id);
            $("#edit_chapter").bsSuggest("destroy");
            $("#edit_chapter").bsSuggest({
                url:"/owep/clazz/getChapterByCourseId?id=" + keyword.id,
                idField:"id",
                keyField:"chapterName",
                effectiveFields: ["chapterName"],
            }).on('onSetSelectValue',function (e,keyword) {
                $("#edit_chapterId").val(keyword.id);
                $("#edit_section").bsSuggest("destroy");
                $("#edit_section").bsSuggest({
                    url:"/owep/clazz/getSectionByChapterId?id=" + keyword.id,
                    idField:"id",
                    keyField:"sectionName",
                    effectiveFields: ["sectionName"],
                }).on('onSetSelectValue',function (e,keyword) {
                    $("#edit_sectionId").val(keyword.id);
                })
            })
        })
    });

    var initdata = function () {
        var init = new Object();
        init.Init = function (url) {
            //加载之前先格式化 放在查询的时候起冲突
            $("#tb_major").bootstrapTable('destroy')
            $("#tb_major").bootstrapTable({
                url: url,
                method: 'get',
                striped: true,  //是否显示行间隔色
                cache: false, //是否使用缓存
                pagination: true, //是否分页
                pageSize: 5,  //每页记录行数
                uniqueId: 'id',  //唯一id
                pageList: [5, 10, 20],
                queryParams: init.queryParams, // 传递参数
                columns: [{
                    field: "coo",
                    checkbox: true,
                }, {
                    field: 'id',
                    title: "id",
                    align: "center",
                    visible: false //隐藏 让该字段不可见 为了后面更新和删除做准备
                }, {
                    field: 'workTitle',
                    title: "标题",
                    align: "center",
                }, {
                    field: 'workContent',
                    title: "内容",
                    align: "center",
                }, {
                    field: 'workFileName',
                    title: "文件",
                    align: "center",
                }, {
                    field: 'course.courseName',
                    title: "所属课程",
                    align: "center",
                },{
                    field: 'clazz.className',
                    title: "所属班级",
                    align: "center",
                },{
                    field: 'createTime',
                    title: "创建时间",
                    align: "center",
                }, {
                    field: 'operator',
                    title: "操作",
                    align: "center",
                    valign: "middle",
                    formatter: actionFormatter, //方法调用
                    events: {
                        'click button[title=修改]': function (e, value, row, index) {
                            $.ajax({
                                //发送AJAX请求·
                                url:"/owep/clazz/toUpdateHomework?id="+row.id,
                                method:"GET",
                                async:true,
                                dataType:"json",  //拿到json
                                success:function (Json) {
                                    //把返回的json对象添加到弹出层的更新表单域中
                                    console.log(Json);
                                    $("form[name='edit_homework'] input[name='edit_homeId']").val(Json.id);
                                    $("form[name='edit_homework'] input[name='edit_classId']").val(Json.clazz.id);
                                    $("form[name='edit_homework'] input[name='edit_class']").val(Json.clazz.className);
                                    $("form[name='edit_homework'] input[name='edit_courseId']").val(Json.course.id);
                                    $("form[name='edit_homework'] input[name='edit_course']").val(Json.course.courseName);
                                    $("form[name='edit_homework'] input[name='edit_chapterId']").val(Json.chapter.id);
                                    $("form[name='edit_homework'] input[name='edit_chapter']").val(Json.chapter.chapterName);
                                    $("form[name='edit_homework'] input[name='edit_sectionId']").val(Json.section.id);
                                    $("form[name='edit_homework'] input[name='edit_section']").val(Json.section.sectionName);
                                    $("form[name='edit_homework'] input[name='edit_title']").val(Json.workTitle);
                                    $("form[name='edit_homework'] textarea[name='edit_content']").val(Json.workContent);
                                },
                                error:function(jqXHR){
                                    alert("获取数据失败");
                                }
                            });
                        },
                        'click button[title=删除]': function (e, value, row, index) {
                            // console.log(row.id);
                            swal({
                                title: "您确定要删除这条信息吗",
                                text: "删除后将无法恢复，请谨慎操作！",
                                type: "warning",
                                showCancelButton: true,
                                confirmButtonColor: "#DD6B55",
                                confirmButtonText: "删除",
                                closeOnConfirm: false
                            }, function () {
                                // 发送ajax请求
                                $.ajax({
                                    //发送AJAX请求
                                    url: "/owep/clazz/deleteHomework?id=" + row.id,
                                    method: "GET",
                                    async: true,
                                    dataType: "text",
                                    success: function (data) {
                                        if (data == "success") {
                                            swal("删除成功！", "您已经永久删除了这条信息。", "success");
                                        } else {
                                            alert("删除失败");
                                        }
                                        $("#tb_major").bootstrapTable('refresh')
                                    },
                                    error: function (jqXHR) {
                                        alert("删除失败");
                                    }

                                });
                                swal("删除成功！", "您已经永久删除了这条信息。", "success");
                            });
                        },
                        'click button[title=下载]': function (e, value, row, index) {
                            window.location.href = '/owep/clazz/downloadHomework/' + row.id;
                        }
                    }
                }]

            });
        };
        init.queryParams = function (params) {
            console.log(params);
            console.log($('#name').val());
            return {
                offset: params.offset,//从数据库第几条记录开始
                limit: params.limit,//找多少条
                name: $("#name").val(),
                org: $("#org").val(),
                branch: $("#branch").val()
            };
        }
        //操作栏的格式化
        function actionFormatter(value, row, index) {
            var id = value;
            var result = "";
            // console.log(row.id);
            // console.log(row.name+"--"+index +"--"+value);
            result += "<button class='btn btn-primary btn-sm' title='修改' style='margin-right: 10px' data-toggle=\"modal\" data-target=\"#update\"><span class='glyphicon glyphicon-edit'></span></button>";
            result += "<button class='btn btn-danger delete btn-sm'  style='margin-right: 10px' title='删除'><span class='glyphicon glyphicon-trash'></span></button>";
            result += "<button class='btn btn-info download btn-sm'  title='下载'><span class='glyphicon glyphicon-download-alt'></span></button>";
            return result;
        };

        return init;
    }

</script>
