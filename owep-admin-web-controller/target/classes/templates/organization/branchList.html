<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <title>H+ 智慧教育平台 - 分支机构</title>

    <meta name="keywords" content="H+后台主题,后台bootstrap框架,会员中心主题,后台HTML,响应式后台">
    <meta name="description" content="H+是一个完全响应式，基于Bootstrap3最新版本开发的扁平化主题，她采用了主流的左右两栏式布局，使用了Html5+CSS3等现代技术">

    <!--[if lt IE 9]>
    <meta http-equiv="refresh" content="0;ie.html"/>
    <![endif]-->

    <link rel="shortcut icon" href="../../static/favicon.ico" th:href="@{/static/favicon.ico}">
    <link href="../../static/css/bootstrap.min.css?v=3.3.6" th:href="@{/static/css/bootstrap.min.css(v='3.3.6')}"
          rel="stylesheet">
    <link href="../../static/css/font-awesome.min.css?v=4.4.0" th:href="@{/static/css/font-awesome.min.css(v='4.4.0')}"
          rel="stylesheet">
    <link href="../../static/css/animate.css" th:href="@{/static/css/animate.css}" rel="stylesheet">
    <link href="../../static/css/style.css?v=4.1.0" th:href="@{/static/css/style.css(v='4.1.0')}" rel="stylesheet">
    <link href="../../static/css/plugins/bootstrap-table/bootstrap-table.min.css" rel="stylesheet"  th:href="@{/static/css/plugins/bootstrap-table/bootstrap-table.min.css}">
    <!-- 弹出框插件 -->
    <link href="../../static/css/plugins/sweetalert/sweetalert.css"
          th:href="@{/static/css/plugins/sweetalert/sweetalert.css}" rel="stylesheet">
    <style type="text/css">
        .table > thead > tr > th {
            color: #2a62bc;
        }

    </style>

</head>
<body class="gray-bg">
<div class="wrapper-content wrapper animated fadeInRight">

    <form class="form-inline">
        <div class="form-group">
            <label>分支名称:</label>
            <input type="text" name="branch_name" class="form-control" id="branch_name">
        </div>
        <div class="form-group">
            <label>&nbsp;&nbsp;所属机构:</label>
            <div class="input-group">
                <input type="text" class="form-control org" id="org-search">
                <input type="text" id="org_id" hidden>
                <div class="input-group-btn">
                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                        <span class="caret"></span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-right" role="menu">
                    </ul>
                </div>
                <!-- /btn-group -->
            </div>
        </div>
        <input type="button" class="btn btn-success" value="查询" id="queryBtn"/>
        <div style="float: right">
            <!-- Button trigger modal -->
            <button type="button" class="btn btn-success " data-toggle="modal" data-target="#myModal">
                添加
            </button>
            <!-- Modal -->
            <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
                <div class="modal-dialog" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                                    aria-hidden="true">&times;</span>
                            </button>
                            <h4 class="modal-title" id="add">增加</h4>
                        </div>
                        <div class="modal-body form-horizontal">
                            <div class="form-group">
                                <label class="col-sm-2 control-label">分支名称</label>
                                <div class="col-sm-4">
                                    <input type="text" class="form-control" placeholder="请输入机构名称" name="add_branch_name">
                                </div>
                            </div>
                            <div class="form-group form-inline">
                                <label class="col-md-2 control-label ">所属机构</label>
                                <!--   <div class="col-md-4">
                                       <div class="input-group-btn">
                                           <input type="text" class="form-control organization" autocomplete="off">
                                           <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                               <span class="caret"></span>
                                           </button>
                                       </div>-->
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <input type="text" class="form-control org"  id="org-save">
                                        <input type="text" id="add_org_id" name="add_org_id" hidden>
                                        <div class="input-group-btn">
                                            <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                                <span class="caret"></span>
                                            </button>
                                            <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                            </ul>
                                        </div>
                                        <!-- /btn-group -->
                                    </div>
                                </div>
                            </div>
                            <!--footer-->
                            <div class="modal-footer">
                                <button type="button" class="btn btn-default" data-dismiss="modal">
                                    关闭
                                </button>
                                <button type="button" class="btn btn-primary"
                                        id="add_sure">保存
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button type="button" id="delete" class="btn btn-danger">删除</button>
        </div>
    </form>

    <table class="table table-striped" id="myTab">
        <!--模态框-->
        <div class="modal fade" id="updateModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                                aria-hidden="true">&times;</span>
                        </button>
                        <h4 class="modal-title" id="change">修改</h4>
                    </div>
                    <div class="modal-body form-horizontal">
                        <div class="form-group">
                            <input type="text" name="edit_branch_name_id">
                            <label class="col-sm-2 control-label">分支名称</label>
                            <div class="col-sm-4">
                                <input type="text" class="form-control" name="edit_branch_name">
                            </div>
                        </div>
                        <div class="form-group form-inline">
                            <label class="col-md-2 control-label ">所属机构</label>
                         <!--   <div class="col-md-4">
                                <div class="input-group-btn">
                                    <input type="text" class="form-control organization" autocomplete="off">
                                    <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                        <span class="caret"></span>
                                    </button>
                                </div>-->
                            <div class="col-md-4">
                                <div class="input-group">
                                    <input type="text" class="form-control org" name="edit_org_name" id="org-edit">
                                    <input type="text" name="edit_org_id" id="org-edit-id" hidden>
                                    <div class="input-group-btn">
                                        <button type="button" class="btn btn-white dropdown-toggle" data-toggle="dropdown">
                                            <span class="caret"></span>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                        </ul>
                                    </div>
                                    <!-- /btn-group -->
                                </div>
                            </div>
                        </div>
                        <!--footer-->
                        <div class="modal-footer">
                            <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                            <button type="button" class="btn btn-primary" id="edit_sure">保存</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </table>
</div>

<!--表单-->

<!-- 全局js -->
<script src="../../static/js/jquery.min.js?v=2.1.4" th:src="@{/static/js/jquery.min.js(v='2.1.4')}"></script>
<script src="../../static/js/bootstrap.min.js?v=3.3.6" th:src="@{/static/js/bootstrap.min.js(v='3.3.6')}"></script>

<!-- 自定义js -->
<script src="../../static/js/content.js?v=1.0.0" th:src="@{/static/js/content.js(v='1.0.0')}"></script>
<!--bootstrap-table-->
<script src="../../static/js/plugins/bootstrap-table/bootstrap-table.min.js" th:src="@{/static/js/plugins/bootstrap-table/bootstrap-table.min.js}"></script>
<script src="../../static/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js" th:src="@{/static/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js}"></script>
<script src="../../static/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js" th:src="@{/static/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js}"></script>
<script src="../../static/js/plugins/suggest/bootstrap-suggest.min.js" th:src="@{/static/js/plugins/suggest/bootstrap-suggest.min.js}"></script>
<!-- 弹出框插件 -->
<script src="../../static/js/plugins/sweetalert/sweetalert.min.js"
        th:src="@{/static/js/plugins/sweetalert/sweetalert.min.js}"></script>
<script>
    $(function () {
        //初始化表格
        var init = new initdata();
        init.Init('/owep/organization/allBranch');
        //点击按钮开始搜索
        $("#queryBtn").click(function () {
            let branch_name = $("#branch_name").val();
            let org_id = $("#org_id").val();
            //判断条件是否存在
            if (branch_name == "" && org_id == "") {
                alert("请选择查询条件");
                return;
            }
            //执行查询
            init.Init('/owep/organization/getAllBranchByKeyWords?name=' + branch_name + '&id=' + org_id);
        });

        //删除
        $('#delete').click(function () {
            let rows = $('#myTab').bootstrapTable('getAllSelections');
            if (rows.length === 0) {
                alert("请至少选择一个")
                return;
            } else {
                var ids = new Array();// 声明一个数组 该数组将要存放所有选择的id
                $(rows).each(function () {// 通过获得别选中的来进行遍历
                    ids.push(this.id);// cid为获得到的整条数据中的一列
                });
                let idList = JSON.stringify(ids);
                // 发送ajax请求
                $.ajax({
                    url:"/owep/organization/deleteSelectBranch",
                    method:"POST",
                    async:true,
                    data:idList,
                    dataType:"text",
                    contentType:"application/json",
                    processData:false,
                    success:function (data) {
                        swal("删除成功!", "您已经永久删除了所选信息。", "success")
                        $("#myTab").bootstrapTable('refresh');
                    },
                    error:function(jqXHR){
                        alert("删除失败");
                    }
                });
            }
        });

        //添加事件
        $('#add_sure').click(function () {
            let branch_name = $("input[name='add_branch_name']").val();
            let org_id = $("input[name='add_org_id']").val();
            if (branch_name == "" || org_id == "") {
                alert("请填写完整信息");
                return;
            }
            let data = {
                "branchName": branch_name,
                "orgInstitute": {
                    "id": org_id
                }
            };
            let dataJSON = JSON.stringify(data);
            // 发送ajax请求
            $.ajax({
                url:"/owep/organization/addBranch",
                method:"POST",
                async:true,
                data: dataJSON,
                dataType:"text",
                contentType: "application/json",
                success:function (data) {
                    swal("添加成功", "", "success");
                    $("#myTab").bootstrapTable('refresh');
                },
                error:function(jqXHR){
                    alert("添加失败");
                }
            });
        });

        //修改事件
        $('#edit_sure').click(function () {
            let branch_name = $("input[name='edit_branch_name']").val();
            let org_id = $("input[name='edit_org_id']").val();
            // 发送ajax请求
            $.ajax({
                url:"/owep/organization/updateBranch?id=" + $("input[name='edit_branch_name_id']").val(),
                method:"POST",
                async:true,
                data:{"name":branch_name,"orgId":org_id},
                dataType:"text",
                success:function (data) {
                    swal("修改成功", "", "success");
                    $("#myTab").bootstrapTable('refresh');
                },
                error:function(jqXHR){
                    alert("修改失败");
                }
            });
        });
    });

    var initdata = function () {
        var init = new Object();
        init.Init = function (url) {
            //加载之前先格式化 放在查询的时候起冲突
            $("#myTab").bootstrapTable('destroy')
            $("#myTab").bootstrapTable({
                url: url,
                toolbar: '#toolbar', // 工具按钮用哪个容器
                pagination: true, //是否显示分页
                striped: true, //是否启用行间隔色
                cache: false,
                method: "get",
                sortable: true, //是否启用排序
                sortOrder: "asc", // 排序方式
                sidePagination: "client", // 分页方式：client客户端分页，server服务端分页（*）
                pageNumber: 1,
                pageSize: 5, //每页的页数
                pageList: [5, 10, 15, 20],
                /*  search:true,*/
                strictSearch: false,                 //查询时是否严格匹配, true表示严格匹配，false表示模糊匹配
                clickToSelect: false, //是否选中
                /* showRefresh:true,*/
                uniqueId: "id",
                columns: [{
                    field: 'checked',
                    checkbox: true, /* 是否添加复选框*/
                },
                    {
                        field: 'id',
                        title: "id",
                        align: "center",
                        visible: false //隐藏 让该字段不可见 为了后面更新和删除做准备
                    },
                    {
                        field: 'branchName',
                        title: '分支名称'
                    },
                    {
                        field: 'orgInstitute.instituteName',
                        title: '所属机构'
                    },
                    {
                        field: 'createTime',
                        title: '创建时间',
                    },
                    {
                        field: 'operator',
                        title: '操作',
                        align: 'center',
                        valign: 'middle',
                        width: '10%',
                        // visible: false,
                        formatter: function (value, row, index) {
                            // var sid_code = base64encode(row.sid + '');   //  sid 加密处理
                            // alert(sid_code);
                            return '<a  data-toggle="modal" data-target="#updateModal" title="修改">' +
                                '<i class="glyphicon glyphicon-edit"></i> ' +
                                '</a>' +
                                '<a href="javascript:void(0)" title="删除">' +
                                '<i class="glyphicon glyphicon-trash text-danger"></i> ' +
                                '</a>';
                        },
                        events: {
                            'click a[title=删除]': function (e, value, row, index) {
                                swal({
                                    title: "您确定要删除这条信息吗",
                                    text: "删除后将无法恢复，请谨慎操作！",
                                    type: "warning",
                                    showCancelButton: true,
                                    confirmButtonColor: "#DD6B55",
                                    confirmButtonText: "删除",
                                    closeOnConfirm: false
                                }, function () {
                                    // 发送ajax请求
                                    $.ajax({
                                        //发送AJAX请求
                                        url: "/owep/organization/deleteBranch?id=" + row.id,
                                        method: "GET",
                                        async: true,
                                        dataType: "text",
                                        success: function (data) {
                                            if (data === "success") {
                                                swal("删除成功！", "您已经永久删除了这条信息。", "success");
                                            }
                                            $("#myTab").bootstrapTable('refresh')
                                        },
                                        error: function (jqXHR) {
                                            alert("删除失败");
                                        }
                                    });
                                });
                            },
                            'click a[title=修改]': function (e, value, row, index) {
                                //ajax请求
                                $.ajax({
                                    url:"/owep/organization/getBranchById?id=" + row.id,
                                    method:"GET",
                                    async:true,
                                    dataType:"json",
                                    success:function (JSON) {
                                        $("input[name='edit_branch_name_id']").val(row.id);
                                        $("input[name='edit_branch_name']").val(JSON.branchName);
                                        $("input[name='edit_org_name']").val(JSON.orgInstitute.instituteName);
                                    },
                                    error:function(jqXHR){
                                        alert("获取信息失败");
                                    }
                                });
                            }
                        }
                    }]
            });
        };
        return init;
    };
    //通过json显示文本框数据
    var testdataBsSuggest1 = $("#org-search").bsSuggest({
        url:"/owep/organization/getAllOrg",
        idField:"instituteId",
        keyField:"instituteName",
        effectiveFields: ["instituteName"],
    }).on('onSetSelectValue',function (e,keyword) {
        $("#org_id").val(keyword.id);
    });

    var testdataBsSuggest1 = $("#org-save").bsSuggest({
        url:"/owep/organization/getAllOrg",
        idField:"instituteId",
        keyField:"instituteName",
        effectiveFields: ["instituteName"],
    }).on('onSetSelectValue',function (e,keyword) {
        $("#add_org_id").val(keyword.id);
    });

    var testdataBsSuggest1 = $("#org-edit").bsSuggest({
        url:"/owep/organization/getAllOrg",
        idField:"instituteId",
        keyField:"instituteName",
        effectiveFields: ["instituteName"],
    }).on('onSetSelectValue',function (e,keyword) {
        $("#org-edit-id").val(keyword.id);
    });
</script>

</body>

</html>
