<!--添加-->
<div class="modal  fade" id="modal_add" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">&times;</span><span
                        class="sr-only">Close</span></button>
                <h4 class="modal-title">添加学生</h4>
            </div>
            <div class="modal-body">
                <form method="post" th:action="@{/user/stuList/addStudent}" class="form-horizontal" id="form_add">
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            学号</label>
                        <div class="col-sm-8">
                            <input type="text" id="add_stuNumber" name="stuNumber" class="form-control" placeholder="请输入学号">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            用户名</label>
                        <div class="col-sm-8">
                            <input type="text" id="add_stuName" name="stuName" class="form-control" placeholder="请输入姓名">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            手机</label>
                        <div class="col-sm-8">
                            <input type="text" id="add_stuPhone" name="stuPhone" class="form-control" placeholder="请输入手机号">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            邮箱</label>
                        <div class="col-sm-8">
                            <input type="email" id="add_stuEmail" name="stuEmail" class="form-control" placeholder="请输入邮箱">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            密码</label>
                        <div class="col-sm-8">
                            <input type="password" id="add_stuPwd" name="stuPwd" class="form-control"
                                   placeholder="请输入密码">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            有效期</label>
                        <div class="col-sm-8">
                            <input type="text" id="add_effectiveDate" name="effectiveDate"
                                   class="form-control myData_add"
                                   placeholder="请输入截至日期">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">是否启用</label>
                        <div class="col-sm-6">
                            <input type="checkbox" id="add_status" name="status"
                                   class="js-switch-2 form-control"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            性别</label>
                        <div class="col-sm-8">
                            <label class="control-label">
                                <input type="radio" checked="checked" value="1" name="add_gender">
                                <span>男</span>
                            </label>&nbsp;&nbsp;

                            <label class="control-label">
                                <input type="radio" value="0" name="add_gender">
                                <span>女</span>
                            </label>
                        </div>
                    </div>
<!--                    <div class="form-group">-->
<!--                        <label class="col-sm-2 control-label">-->
<!--                            毕业院校</label>-->
<!--                        <div class="col-sm-8">-->
<!--                            <input type="text" name="school" disabled="" class="form-control " placeholder="">-->
<!--                        </div>-->
<!--                    </div>-->
<!--                    <div class="form-group">-->
<!--                        <label class="col-sm-2 control-label">-->
<!--                            省市区</label>-->
<!--                        <div class="col-sm-8">-->
<!--                            <input type="text" name="region" disabled="" class="form-control " placeholder="">-->
<!--                        </div>-->
<!--                    </div>-->

                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-white" data-dismiss="modal">关闭</button>
                <button type="button" id="model_add_submit_btn" class="btn btn-primary add">保存</button>
            </div>
        </div>
    </div>
</div>

<!--分配班级-->
<div class="modal  fade" id="modal_allocation" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog ">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">&times;</span><span
                        class="sr-only">Close</span></button>
                <h4 class="modal-title">分配班级</h4>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" id="form_allocation_1">
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            学生姓名</label>
                        <div class="col-sm-8">
                            <input type="text" name="name" disabled="" class="form-control" placeholder="">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label"></label>
                        <div class="col-sm-8">
                            <button type="button" class="btn btn-primary allocation">分配班级</button>
                            <button type="button" class="btn btn-default class_transfer">学生转班</button>
                        </div>
                    </div>
                    <div id="allocation">
                        <input type="text" id="allc_id_0" name="id" hidden>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">
                                分配班级</label>
                            <div class="col-sm-8">
                                <div class="ibox-content">
                                    <div class="treeview_allocation"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="class_transfer" style="display:none;">
                        <input type="text" id="allc_id_1" name="id" hidden>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">
                                所在班级</label>
                            <div class="col-sm-8">
                                <div class="input-group">
                                    <input type="text" name="class_start" class="form-control" id="testNoBtn6">
                                    <div class="input-group-btn">
                                        <button type="button" class="btn btn-white dropdown-toggle"
                                                data-toggle="dropdown">
                                            <span class="caret"></span>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                        </ul>
                                    </div>
                                    <!-- /btn-group -->
                                </div>
                            </div>
                        </div>
                        <div class="form-group ">
                            <label class="col-sm-2 control-label">
                                转到班级</label>
                            <div class="col-sm-8">
                                <div class="input-group">
                                    <input type="text" name="class_end" class="form-control" id="testNoBtn7">
                                    <div class="input-group-btn">
                                        <button type="button" class="btn btn-white dropdown-toggle"
                                                data-toggle="dropdown">
                                            <span class="caret"></span>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-right" role="menu">
                                        </ul>
                                    </div>
                                    <!-- /btn-group -->
                                </div>
                            </div>
                        </div>
                        <div class="form-group ">
                            <label class="col-sm-2 control-label">
                                相关描述</label>
                            <div class="col-sm-8">
                                <textarea class="form-control" name="describe" rows="4"></textarea>
                                <!-- /btn-group -->
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-white" data-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary save-btn" data-action="allocate">保存</button>
            </div>
        </div>
    </div>
</div>

<div class="modal  fade" id="modal_to_channel" tabindex="-1" role="dialog" aria-hidden="true">

    function echoDataForm_2(eventParentName, echoDataList, row) {
        // console.log(eventParentName);
        // console.log(echoDataList);
        // console.log(row);

        function value(item, row) {
            console.log("item:"+item);
            let value = "";
            for (let i in row) {

                if(i === item ){
                    console.log("i："+i);
                    value = row[i];
                } //从row中找item,找到则复制值
            }
            value === "" ? value = item : "";//值若为空(row中没有对应值)，用item顶位
            console.log("value"+value);
            return value;
        }

            echoDataList.forEach(function (item, index) {
                if (item === "gender") { //性别特别处理
                    let gender_val = value("gender", row); // 获取性别的值

                    // 首先清除所有性别的单选按钮选择
                    $(eventParentName + ' input[name="edit_gender"]').prop('checked', false);

                    // 根据性别的值选择相应的单选按钮
                    if (gender_val === "男") {
                        $(eventParentName + ' input[name="edit_gender"][value="1"]').prop('checked', true);
                    } else if (gender_val === "女") {
                        $(eventParentName + ' input[name="edit_gender"][value="0"]').prop('checked', true);
                    }
                } else if (item === "status") {
                let status_val = value("status", row);
                let checkbox = $(eventParentName + ' .js-switch-3')[0];

                // 移除之前的Switchery DOM元素和事件监听器
                if ($(checkbox).next().hasClass('switchery')) {
                    $(checkbox).next().remove();
                    $(checkbox).removeAttr('data-switchery');
                }

                // 为特定的checkbox创建Switchery实例
                let switchery = new Switchery(checkbox);

                if (status_val == 1) {
                    checkbox.checked = true;
                } else {
                    checkbox.checked = false;
                }

                // 更新Switchery的状态
                switchery.setPosition(false); // 这将会更新滑动按钮的视觉状态，不会触发onChange事件
            } else {
                    $(eventParentName + ' input[name=\"' + item + '\"]').val(value(item, row));//其他普通文本
                }
        });
    }

    /*查询记录操作*/
    function queryRecords_2(eventParentName, dataList, url) {
        let queryList = dataList;
        let queryMap = new Map();
        let queryNullList = new Array()
        queryList.forEach(function (item, index) {
            let event = $('' + eventParentName + ' input[name=' + item + ']');
            event.val() == "" ?
                queryNullList.push($('' + eventParentName + ' input[name=' + item + ']'))
                : queryMap.set(event.attr('name'), event.val());
        })

        let formData="";
        queryMap.forEach(function (value, key){
            formData += key +'='+value +'&';
        });
        formData = formData.substr(0,formData.length - 1);

        //静态假数据
        /*let fakeData = [
            {id: 1, userName: 'John', realName: 'John', userPhone: 18812345678, userEmail: "zch@163.com", status: 1, lastAccessTime: "2019-01-01"},
            //...可以添加更多的假数据...
        ];*/
        //发送ajax 查询
        $.ajax({
            url: url,
            method: "get",
            async: true,
            data:formData,
            dataType: "json",   //期望服务端返回的数据类型
            success: function (data) {
                let jsonString = JSON.stringify(data.data);
                console.log("这是Result里的data数据:"+jsonString);
                if (data.status === "701") {
                    $('#tb_departments').bootstrapTable("load", []);  // 清空表格数据
                } else if (data.status === "200") {
                    $('#tb_departments').bootstrapTable("load", data.data); // 修复了这里
                }
            },
            error: function (jqXHR) {
                swal("搜索失败！", "未知错误", "error");
            }
        });

        if (queryNullList.length > 0) {
            swal("搜索失败", "搜索数据不允许为空", "error");
        } else {
            swal("搜索成功！", "已为你重新加载数据", "success")
        }
        queryMap.forEach(function (key,value) {
            console.log(value);
            $(''+eventParentName+' input[name='+value+']').css('border-color',"");
        })
    }
</script>

<script>
    $(function () {
        // 当模态框显示时，设置默认状态
        $('#modal_allocation').on('show.bs.modal', function (e) {
            resetModal();
        });

        // 当模态框隐藏时，重置模态框状态
        $('#modal_allocation').on('hide.bs.modal', function (e) {
            resetModal();
        });

        function resetModal() {
            $('.save-btn').attr('data-action', 'allocate');
            $('.save-btn').text('分配');

            $('.class_transfer').attr("class", "btn btn-default class_transfer");
            $('#class_transfer').css("display", "none");
            $('.allocation').attr("class", "btn btn-primary allocation");
            $('#allocation').css("display", "");
        }

        $('.allocation').click(function () {
            // 设置保存按钮的 data-action 属性和文本
            $('.save-btn').attr('data-action', 'allocate');
            $('.save-btn').text('分配');

            $('.class_transfer').attr("class", "btn btn-default class_transfer");
            $('#class_transfer').css("display", "none");
            $('.allocation').attr("class", "btn btn-primary allocation");
            $('#allocation').css("display", "");
        });

        $('.class_transfer').click(function () {
            // 设置保存按钮的 data-action 属性和文本
            $('.save-btn').attr('data-action', 'transfer');
            $('.save-btn').text('转班');

            $('.allocation').attr("class", "btn btn-default allocation");

            $('.class_transfer').attr("class", "btn btn-primary class_transfer");
            $('#class_transfer').css("display", "");
        });

        $('.save-btn').click(function () {
            var action = $(this).attr('data-action');
            let $treeview = $('.treeview_allocation');
            if(action === 'allocate') {
                // 这里添加分配班级的代码
                let stuId = $("#allc_id_0").val();
                let classId;
                console.log("stuId:" + stuId);
                let check = $treeview.treeview('getChecked');

                    console.log("No items checked."); // 如果没有选中的项，则打印
                }
                $.each(check, function (index, item) {
                    console.log("Checking item:", item); // 打印整个项目来查看其结构
                    if (item.parentId!==undefined) {
                        console.log("Item with parentId:", item); // 如果 item 有 parentId，则打印
                        if (item.tags) {
                            console.log("Tags:", item.tags); // 如果 tags 存在且有值，则打印
                        } else {
                            console.log("No tags available for this item."); // 如果没有 tags，则打印
                        }
                        classId = item.tags;
                    }
                });
                if (classId === undefined) {
                    swal("请选择班级", "", "warning");
                    return;
                } else if (check.length > 1) {
                    swal("只能选择一个班级", "", "warning");
                    return;
                }
                console.log("classId:" + classId);
                $.ajax({
                    url: "/owep/user/stuList/allocation",
                    type: "post",
                    data: {
                        "stuId": stuId,
                        "classId": classId
                    },
                    dataType: "text",
                    success: function (data) {
                        console.log("data1:" + data);
                        if (data === "success") {
                            swal("分配成功!", "", "success");
                            //$('#allocation').modal('hide');
                            //$('#table').bootstrapTable('refresh');
                        } else if (data === "failure") {
                            swal("分配失败!", "已经存在班级", "info");
                        }
                    },
                    error: function (jqXRH) {
                        console.log(jqXRH.status);
                        swal("分配失败!", "未知错误", "error");
                    }
                });
            } else if(action === 'transfer') {
                // 这里添加学生转班的代码
                let stuId = $("#allc_id_1").val();
                let className = $("#testNoBtn7").val();
                console.log("stuId:" + stuId);
                console.log("className:" + className);
                $.ajax({
                    url: "/owep/user/stuList/transfer",
                    type: "post",
                    data: {
                        "stuId": stuId,
                        "className": className
                    },
                    success: function (data) {
                        if (data === "success") {
                            swal("转班成功!", "", "success");
                        } else if (data === "existFalse") {
                            swal("转班失败!", "没有该班级", "error");
                        } else if (data === "failure") {
                            swal("转班失败！", "未知错误，请联系管理员", "error");
                        }
                    },
                    error: function (jqXRH) {
                        console.log(jqXRH.status);
                        swal("转班失败!", "未知错误", "error");
                    }
                })
            }
        });
    });
</script>

            }

                stuPwd: stuPwd,
                effectiveDate: effectiveDate,
                status: status,
                gender: gender
            };
            console.log(stuData);
            let stuJson = JSON.stringify(stuData);

            $.ajax({

                        return; }

                    $.ajax({

                        }

            });
