<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新闻资讯</title>
    <meta name="description" content="新闻资讯">
    <link href="../../static/css/bootstrap.min.css?v=3.3.6" rel="stylesheet"
          th:href="@{/static/css/bootstrap.min.css(v='3.3.6')}">
    <link href="../../static/css/font-awesome.min.css?v=4.4.0" rel="stylesheet"
          th:href="@{/static/css/font-awesome.min.css(v='4.4.0')}">
    <link rel="stylesheet" href="../../static/css/animate.css" th:href="@{/static/css/animate.css}">
    <link href="../../static/css/plugins/bootstrap-table/bootstrap-table.min.css" rel="stylesheet"
          th:href="@{/static/css/plugins/bootstrap-table/bootstrap-table.min.css}">
    <link href="../../static/css/plugins/datapicker/datepicker3.css"
          th:href="@{/static/css/plugins/datapicker/datepicker3.css}" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/static/css/style.css}">
    <link rel="stylesheet" href="../../static/css/plugins/sweetalert/sweetalert.css"
          th:href="@{/static/css/plugins/sweetalert/sweetalert.css}">

    <style type="text/css">
        .table>thead>tr>th{
            color: #2a62bc;
        }
        .form-inline>.btn:not(.query){
            margin-left: 0.8%;
            float: right;
        }
    </style>

</head>
<body class="gray-bg">
<div class="warning wrapper-content animated fadeInRight">
    <div>
        <div id="toolbar" class="btn-group" style="margin-right: 595px">
            <button id="btn_add" type="button" class="btn btn-default" data-target="#mySave" data-toggle="modal">
                <span class="glyphicon glyphicon-plus" aria-hidden="true"></span>新增
            </button>
            <button id="deleteAll" type="button" class="btn btn-danger">
                <span class="glyphicon glyphicon-remove" aria-hidden="true"></span>删除
            </button>
        </div>
        <table class="table table-bordered table-hover table-striped" id="tb_departments">
            <!-- 表格内容 -->
        </table>
    </div>
</div>


<!--新增的弹窗-->
<div class="modal fade" tabindex="-1" role="dialog" id="mySave">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title">编辑</h4>
            </div>
            <div class="modal-body">
                <form action="" class="form-horizontal">
                    <div class="form-group">
                        <label  class="col-sm-2 control-label">新闻标题:</label>
                        <div class="col-sm-6">
                            <input type="text" id="addNewsTitle" name="addNewsTitle" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label" >新闻类型:</label>
                        <div class="col-sm-6">
                            <select class="form-control" name="addNewsType" id="addNewsType">
                                <option value="1">国际新闻</option>
                                <option value="2">国内新闻</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label  class="col-sm-2 control-label">发布人:</label>
                        <div class="col-sm-6">
                            <input type="text" id="addNewsPublisher" name="addNewsPublisher" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">新闻内容:</label>
                        <div class="col-sm-7">
                            <textarea cols="50" rows="7" id="addNewsContent" name="addNewsContent" class="form-control"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" id="saveNew">保存</button>
            </div>
        </div>
    </div><!-- /.modal-dialog -->
</div><!-- /.modal -->

<!--编辑的模态框-->
<div class="modal fade" tabindex="-1" role="dialog" id="myEdit">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title">编辑</h4>
            </div>
            <div class="modal-body">
                <form action="" class="form-horizontal">
                    <div class="form-group">
                        <input type="text" id="edit_id" name="edit_id" hidden>
                        <label  class="col-sm-2 control-label">新闻标题:</label>
                        <div class="col-sm-6">
                            <input type="text" id="editNewsTitle" name="editNewsTitle" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label" >新闻类型:</label>
                        <div class="col-sm-6">
                            <select class="form-control" name="editNewsType" id="editNewsType">
                                <option value="国际新闻">国际新闻</option>
                                <option value="国内新闻">国内新闻</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label  class="col-sm-2 control-label">发布人:</label>
                        <div class="col-sm-6">
                            <input type="text" id="editNewsPublisher" name="editNewsPublisher" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">新闻内容:</label>
                        <div class="col-sm-7">
                            <textarea cols="50" rows="7" id="editNewsContent" name="editNewsContent" class="form-control"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" id="saveEdit">保存</button>
            </div>
        </div>
    </div><!-- /.modal-dialog -->
</div><!-- /.modal -->

<script src="../../static/js/jquery.min.js"
        th:src="@{/static/js/jquery.min.js}"></script>
<script src="../../static/js/bootstrap.min.js"
        th:src="@{/static/js/bootstrap.min.js}"></script>
<script src="../../static/js/plugins/bootstrap-table/bootstrap-table.min.js"
        th:src="@{/static/js/plugins/bootstrap-table/bootstrap-table.min.js}"></script>
<script src="../../static/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"
        th:src="@{/static/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js}"></script>
<script src="../../static/js/plugins/datapicker/bootstrap-datepicker.js"
        th:src="@{/static/js/plugins/datapicker/bootstrap-datepicker.js}"></script>
<script src="../../static/js/plugins/datapicker/bootstrap-datepicker.zh-CN.min.js"
        th:src="@{/static/js/plugins/datapicker/bootstrap-datepicker.zh-CN.min.js}"></script>
<script src="../../static/js/plugins/sweetalert/sweetalert.min.js"
        th:src="@{/static/js/plugins/sweetalert/sweetalert.min.js}"></script>

<script>
    $(function () {
        //下面的例子
        //1.初始化Table
        var oTable = new TableInit();
        oTable.Init('/owep/notice/getAllNews');
    });

    var TableInit = function () {
        var oTableInit = new Object();
        //初始化Table
        oTableInit.Init = function (url) {
            $('#tb_departments').bootstrapTable({
                url: url,         //请求后台的URL（*）
                method: 'get',                      //请求方式（*）
                toolbar: '#toolbar',                //工具按钮用哪个容器
                //striped: true,                      //是否显示行间隔色
                cache: false,                       //是否使用缓存，默认为true，所以一般情况下需要设置一下这个属性（*）
                pagination: true,                   //是否显示分页（*）
                sortOrder: "asc",                   //排序方式
                queryParams: oTableInit.queryParams,//传递参数（*）
                sidePagination: "client",           //分页方式：client客户端分页，server服务端分页（*）
                pageNumber:1,                       //初始化加载第一页，默认第一页
                pageSize: 10,                       //每页的记录行数（*）
                pageList: [5, 10, 15, 20],        //可供选择的每页的行数（*）
                search:true,                        //只在客户端搜索，不进入服务端，表示是否显示表格搜索
                strictSearch:false,                 //查询是是否严格匹配，true表示严格，false表示模糊
                showColumns: true,                  //是否显示所有的列
                showRefresh: true,                  //是否显示刷新按钮
                minimumCountColumns: 2,             //最少允许的列数
                clickToSelect: false,                //是否启用点击选中行
                uniqueId: "id",                     //每一行的唯一标识，一般为主键列
                paginationPreText: "上一页",
                paginationNextText: "下一页",
                columns: [{
                    checkbox: true
                }, {
                    field: 'id',
                    title: '新闻编号',
                    visible: true
                }, {
                    field: 'newsTitle',
                    title: '新闻标题'
                }, {
                    field: 'newsContent',
                    title: '新闻内容'
                },  {
                    field:'newsType',
                    title:'新闻类型'
                },{
                    field: 'newsPublisher',
                    title: '发布人'
                },{
                    field: 'createTime',
                    title: '创建时间'
                },{
                    title: '操作',
                    field: 'Id',
                    width:'110',
                    events:operateEvents,
                    formatter: function (value, row, index) {
                        var html = '<Button type="button" class="btn btn-white" title="编辑" data-toggle="modal" ' +
                            'data-target="#myEdit"><i class="glyphicon glyphicon-edit"></i></Button>';
                        html += '<Button type="button" title="删除" class="btn btn-white">' +
                            '<i class="glyphicon glyphicon-trash text-danger"></i></Button>';
                        return html;
                    }
                }]
            });
        };
        return oTableInit;
    };

    //控制时间
    $("#newsStartTime,#addIssueTime").datepicker ({
        format: "yyyy-mm-dd hh:ii:ss",
        language: "zh-CN",
        clearBtn: true,//清除
        autoclose: true,
        todayHighlight: true,
        format: 'yyyy-mm-dd',
        todayBtn: false,//今日按钮
        startDate: '1970-1-1', //与你自己设置的格式一致yyyy-mm-dd，未设置的话与默认格式一致mm/dd/yyyy
        endDate: '2070-1-1'
    });

    //单次删除的弹窗插件
    window.operateEvents = {
        'click button[title="删除"]': function (e, value, row, index) {
            swal({
                title: "您确定要删除这条数据吗",
                text: "删除后将无法恢复，请谨慎操作！",
                type: "warning",
                showCancelButton: true,
                confirmButtonColor: "#DD6B55",
                confirmButtonText: "删除",
                cancelButtonText: "取消",
                closeOnConfirm: false
            }, function () {
                //发送ajax请求
                $.ajax({
                    url: "/owep/notice/deleteNew",
                    method:"get",
                    data: {"id" : row.id},
                    dataType:"text",
                    async:"true",
                    success:function (data) {
                        swal("删除成功", "您已经永久删除了这条信息。", "success");
                        // 重新加载本页面
                        $('#tb_departments').bootstrapTable('refresh');
                    },
                    error:function (jqXHP) {
                        console.log(jqXHP);
                        swal("删除失败", "您删除的信息有误，请重新删除!", "error");
                    }
                });
            });
        },
        'click button[title="编辑"]':function (e, value, row, index) {
            $("#editNewsTitle").val(row.newsTitle);
            $("#editNewsType").val(row.newsType);
            $("#editNewsPublisher").val(row.newsPublisher);
            $("#editNewsContent").val(row.newsContent);
            $("#edit_id").val(row.id);
        }
    };
</script>

<script>
    $(document).ready(function () {
        //删除多行记录的弹窗操作
        $("#deleteAll").click(function () {
            let rows = $("#tb_departments").bootstrapTable('getAllSelections');//获取要删除的数据
            if (rows.length == 0) {  //判断是否选中
                swal("至少选择一行","","error");
                return false;
            }
            let deleteData = [];
            for (let i=0;i<rows.length;i++) {
                deleteData.push(rows[i].id);
            }
            console.log(deleteData.toString());
            swal({
                title: "你确定要删除" + deleteData.length + "条记录吗?",
                text: "删除后将无法恢复，是否继续?",
                type: "warning",
                showCancelButton: true,
                confirmButtonColor: "#DD6B55",
                confirmButtonText: "删除",
                cancelButtonText: "取消",
                closeOnConfirm: false,
            }, function () {
                //发送ajax请求
                let jsonData = JSON.stringify(deleteData);
                $.ajax({
                    url: "/owep/notice/deleteAllNews",
                    method:"post",
                    data:jsonData,
                    dataType:"text",
                    async:"true",
                    contentType:"application/json",
                    success:function (data) {
                        swal("删除成功", "您已经永久删除了这条信息。", "success");
                        // 重新加载本页面
                        $('#tb_departments').bootstrapTable('refresh');
                    },
                    error:function (jqXHP) {
                        console.log(jqXHP);
                        swal("删除失败", "您删除的信息有误，请重新删除!", "error");
                    }
                });


            });
        });

        //保存
        $('#saveNew').click(function () {
            let title = $("input[name='addNewsTitle']").val();
            let type = $("select[name='addNewsType']").val();
            let publisher = $("input[name='addNewsPublisher']").val();
            let content = $("textarea[name='addNewsContent']").val();
            if (title === "" || publisher === "" || content === "" || type === "") {
                alert("请填写完整信息")
                return;
            }

            let data = {
                "newsTitle":title,
                "newsType":type,
                "newsPublisher":publisher,
                "newsContent":content
            };
            let dataJSON = JSON.stringify(data);
            // 发送ajax请求
            $.ajax({
                url:"/owep/notice/addNew",
                method:"POST",
                async:true,
                data: dataJSON,
                dataType:"text",
                contentType: "application/json",
                success:function (data) {
                    if (data === "noTeacher") {
                        swal("输入信息有误！", "不存在教师", "warning");
                        return;
                    } else if (data === "error") {
                        swal("添加失败！", "未知错误", "error");
                        return;
                    }
                    swal("添加成功", "", "success");
                    $('#tb_departments').bootstrapTable('refresh');
                },
                error:function(jqXHR){
                    alert("添加失败");
                }
            });
        });

        //编辑
        $('#saveEdit').click(function () {
            let title = $("input[name='editNewsTitle']").val();
            let type = $("select[name='editNewsType']").val();
            let publisher = $("input[name='editNewsPublisher']").val();
            let content = $("textarea[name='editNewsContent']").val();
            let id = $("input[name='edit_id']").val();
            if (title === "" || publisher === "" || content === "" || type === "") {
                alert("请填写完整信息")
                return;
            }

            let data = {
                "id": id,
                "newsTitle":title,
                "newsType":type,
                "newsPublisher":publisher,
                "newsContent":content
            };
            let dataJSON = JSON.stringify(data);
            // 发送ajax请求
            $.ajax({
                url:"/owep/notice/updateNew",
                method:"POST",
                async:true,
                data: dataJSON,
                dataType:"text",
                contentType: "application/json",
                success:function (data) {
                    if (data === "noTeacher") {
                        swal("输入信息有误！", "不存在教师", "warning");
                        return;
                    } else if (data === "error") {
                        swal("修改失败！", "未知错误", "error");
                        return;
                    }
                    swal("修改成功", "", "success");
                    $('#tb_departments').bootstrapTable('refresh');
                },
                error:function(jqXHR){
                    alert("修改失败");
                }
            });
        });
    });
</script>
</body>
</html>
